openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Star Computer's Academy API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: enrollments
    description: Enrollment operations
  - name: contacts
    description: Contact form operations
  - name: courses
    description: Course management
  - name: testimonials
    description: Testimonials management
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /enrollments:
    post:
      operationId: createEnrollment
      tags: [enrollments]
      summary: Submit enrollment form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnrollmentRequest"
      responses:
        "201":
          description: Enrollment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
    get:
      operationId: listEnrollments
      tags: [enrollments]
      summary: List all enrollments (admin)
      responses:
        "200":
          description: List of enrollments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Enrollment"

  /enrollments/{id}:
    patch:
      operationId: updateEnrollmentStatus
      tags: [enrollments]
      summary: Update enrollment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEnrollmentStatusRequest"
      responses:
        "200":
          description: Updated enrollment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
    delete:
      operationId: deleteEnrollment
      tags: [enrollments]
      summary: Delete an enrollment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /contacts:
    post:
      operationId: createContact
      tags: [contacts]
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactRequest"
      responses:
        "201":
          description: Contact message saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List all contact messages (admin)
      responses:
        "200":
          description: List of contact messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete a contact message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List all courses
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a course (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
      responses:
        "201":
          description: Created course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /courses/{id}:
    patch:
      operationId: updateCourse
      tags: [courses]
      summary: Update a course (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
      responses:
        "200":
          description: Updated course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
    delete:
      operationId: deleteCourse
      tags: [courses]
      summary: Delete a course (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /testimonials:
    get:
      operationId: listTestimonials
      tags: [testimonials]
      summary: List all testimonials
      responses:
        "200":
          description: List of testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"
    post:
      operationId: createTestimonial
      tags: [testimonials]
      summary: Create a testimonial (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTestimonialRequest"
      responses:
        "201":
          description: Created testimonial
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Testimonial"

  /testimonials/{id}:
    delete:
      operationId: deleteTestimonial
      tags: [testimonials]
      summary: Delete a testimonial (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    CreateEnrollmentRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        course:
          type: string
        message:
          type: string
      required:
        - name
        - phone
        - course

    UpdateEnrollmentStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, cancelled]
      required:
        - status

    Enrollment:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        course:
          type: string
        message:
          type: string
        status:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - phone
        - course
        - status
        - createdAt

    CreateContactRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        message:
          type: string
      required:
        - name
        - message

    Contact:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        message:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - message
        - createdAt

    CreateCourseRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        duration:
          type: string
        fee:
          type: string
        icon:
          type: string
        isActive:
          type: boolean
      required:
        - title
        - description
        - duration
        - fee

    Course:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        duration:
          type: string
        fee:
          type: string
        icon:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - duration
        - fee
        - isActive
        - createdAt

    CreateTestimonialRequest:
      type: object
      properties:
        studentName:
          type: string
        course:
          type: string
        review:
          type: string
        rating:
          type: integer
        isActive:
          type: boolean
      required:
        - studentName
        - course
        - review
        - rating

    Testimonial:
      type: object
      properties:
        id:
          type: integer
        studentName:
          type: string
        course:
          type: string
        review:
          type: string
        rating:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - studentName
        - course
        - review
        - rating
        - isActive
        - createdAt

    AdminStats:
      type: object
      properties:
        totalEnrollments:
          type: integer
        pendingEnrollments:
          type: integer
        confirmedEnrollments:
          type: integer
        totalContacts:
          type: integer
        totalCourses:
          type: integer
        totalTestimonials:
          type: integer
      required:
        - totalEnrollments
        - pendingEnrollments
        - confirmedEnrollments
        - totalContacts
        - totalCourses
        - totalTestimonials
